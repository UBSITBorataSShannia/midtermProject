<div class="container mt-4">
  <h2>Product Management</h2>

  <div class="search-box">
    <input
      type="text"
      class="form-control"
      [(ngModel)]="searchTerm"
      placeholder="{{ searchPlaceholder }}"
    />
  </div>

  <table class="table table-hover product-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Status</th>
        <th>Brand</th>
        <th>Rating</th>
      </tr>
    </thead>

    <tbody>
      @for (product of getFilteredProducts(); track product.id) {
        <tr (click)="getProduct(product)">
          <td>
            <input class="form-control" [(ngModel)]="product.name">
          </td>

          <td>
            <input class="form-control" [(ngModel)]="product.category">
          </td>

          <td>
            <input class="form-control" type="number" [(ngModel)]="product.price">
          </td>

          <td>
            <input class="form-control" type="number" [(ngModel)]="product.stock">
          </td>

          <td>
            <input class="form-control" [(ngModel)]="product.status">
          </td>

          <td>
            <input class="form-control" [(ngModel)]="product.brand">
          </td>

          <td>
            <input class="form-control" type="number" [(ngModel)]="product.rating">
          </td>
        </tr>
      }
    </tbody>
  </table>

  <!-- CHILD COMPONENT WILL LOAD HERE -->
  <router-outlet></router-outlet>

</div>
